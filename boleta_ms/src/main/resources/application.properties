
spring.application.name=boleta-ms
server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3306/perfulandia_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.security.user.name=admin
spring.security.user.password=1234

logging.file.name=logs/boleta_ms.log
logging.level.root=INFO
logging.level.com.example.boleta_ms=DEBUG

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha


# services.clientes.url=http://localhost:8081
# services.pedidos.url=http://localhost:8087
# services.pagos.url=http://localhost:8088

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

