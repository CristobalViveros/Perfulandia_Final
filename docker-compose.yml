services:
  mysql:
    image: mysql:8.4
    container_name: perfulandia-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: perfulandia_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/perfulandia_db.sql:/docker-entrypoint-initdb.d/perfulandia_db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build: ./eureka_server
    container_name: eureka-server
    restart: always
    ports:
      - "8761:8761"
    environment:
      SPRING_APPLICATION_NAME: eureka-server
      SERVER_PORT: 8761
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
      EUREKA_INSTANCE_HOSTNAME: eureka-server
    depends_on:
      mysql:
        condition: service_healthy

  clientes-ms:
    build: ./clientes_ms
    container_name: clientes-ms
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: clientes-ms
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/perfulandia_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  categoria-ms:
    build: ./categoria_ms
    container_name: categoria-ms
    restart: always
    ports:
      - "8084:8084"
    environment:
